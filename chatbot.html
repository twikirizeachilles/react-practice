<!doctype html>
<html lang="en">
  <head>
    <title>chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function Chatboot() {
        return(<>
          <input placeholder="Send a message to chatbot" size="30" />
          <button> Send </button>
          </>
        );
      }
      function ChatbootMessage(props) {
        const sender = props.sender;
        
        return(
          <div>
            {sender === "chatbot" && <img src="robot.png" width="30"/>}
            {props.message}
            {sender === "user" && <img src="user.png" width="30"/>} 
          </div>
        );
      }

      function ChatMessages(){
         const chatMessages = [{
            message: "Hello chatbot.",
            sender: "user",
            id: "id1"
          },{
            message: "How can I help you?",
            sender: "chatbot",
            id: "id2"
          },{
            message: "Can you tell me todays date?",
            sender: "user",
            id: "id3"
          },{
            message: "Sure, today is 2024-06-01.",
            sender: "chatbot",
            id: "id4"
        }];
        return(
          <> 
              {chatMessages.map((chatMessage) => {
          return(
            <ChatbootMessage 
              message={chatMessage.message} 
              sender={chatMessage.sender} 
              key={chatMessage.id} />
            )}
            )}
          </>
        )
      }

      function App  () {
         
        
        return(
          <>
          <Chatboot />
          
        </>
      );
      }
        

      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(App());
    </script>
  </body>
</html>
