<!doctype html>
<html lang="en">
  <head>
    <title>chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function Chatboot() {
        return(<>
          <input placeholder="Send a message to chatbot" size="30" />
          <button> Send </button>
          </>
        );
      }
      function ChatbootMessage(props) {
        const sender = props.sender;
        if(sender === 'chatbot'){
          return(
            <div>]
              <img src="robot.png" width="30"/>
              {props.message}
            </div>
          );
        }
        return(
          <div>
            {props.message}
            <img src="user.png" width="30"/>
          </div>
        );
      }

      const app = (
        <>
          <Chatboot />
          <ChatbootMessage message="Hello chatbot." sender="user" />
          <ChatbootMessage message="How can I help you?" sender="chatbot" />
          <ChatbootMessage message="Can you tell me todays date?" sender="user" />
          <ChatbootMessage message="Sure, today is 2024-06-01." sender="chatbot" />
        </>
      );

      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(app);
    </script>
  </body>
</html>
